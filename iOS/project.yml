name: Doorhinge
options:
  bundleIdPrefix: com.shimondeitel.doorhinge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Doorhinge:
    type: application
    platform: iOS
    sources:
      - path: Doorhinge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.doorhinge
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Doorhinge/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DoorhingeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DoorhingeTests
      - path: Doorhinge.storekit
    dependencies:
      - target: Doorhinge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.doorhinge.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DoorhingeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DoorhingeUITests
    dependencies:
      - target: Doorhinge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.doorhinge.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Doorhinge:
    build:
      targets:
        Doorhinge: all
        DoorhingeTests: [test]
        DoorhingeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Doorhinge.storekit
    test:
      config: Debug
      storeKitConfiguration: Doorhinge.storekit
      targets:
        - DoorhingeTests
        - DoorhingeUITests
    archive:
      config: Release
